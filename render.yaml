services:
  - type: web
    name: cineguide-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python download_data.py && uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
    disk:
      name: vector-store
      mountPath: /opt/render/project/src/vector_store
      sizeGB: 1
