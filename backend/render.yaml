services:
  - type: web
    name: cineguide-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python download_data.py && uvicorn web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: REDIS_URL
        fromService:
          name: cineguide-redis
          type: redis
          property: connectionString
    disk:
      name: vector-store
      mountPath: /opt/render/project/src/vector_store
      sizeGB: 1

  - type: redis
    name: cineguide-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # only internal access
